name: Android Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout phoenix
        uses: actions/checkout@v3
      - name: Checkout lightning-kmp fork
        uses: actions/checkout@v3
        with:
          repository: makewalletfirst/LightningEver-bitever-eclair-kmp
          path: lightning-kmp
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Publish lightning-kmp-core 1.11.5-DEBUG to MavenLocal
        working-directory: lightning-kmp
        run: ./gradlew :lightning-kmp-core:publishToMavenLocal -x test
      - name: Build Android APK
        run: ./gradlew :phoenix-android:assembleDebug -x allTests
